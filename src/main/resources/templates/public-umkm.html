<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title th:text="${umkm.namaUsaha}">
        Profil UMKM
    </title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f5;
            color: #222;
        }

        .container {
            width: min(100% - 32px, 900px);
            margin: 32px auto;
        }

        .profile {
            background: white;
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 24px;
        }

        .logo {
            width: 110px;
            height: 110px;
            border-radius: 16px;
            object-fit: cover;
            background: #eeeeee;
        }

        .profile-header {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .profile h1 {
            margin: 0 0 8px;
        }

        .profile p {
            margin: 6px 0;
        }

        .whatsapp {
            display: inline-block;
            margin-top: 14px;
            padding: 10px 16px;
            background: #18864b;
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }

        .products {
            display: grid;
            grid-template-columns:
                repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .product-card {
            background: white;
            border-radius: 14px;
            padding: 16px;
        }

        .product-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
            background: #eeeeee;
        }

        .product-card h3 {
            margin-bottom: 8px;
        }

        .price {
            font-weight: bold;
            color: #17683d;
        }

        .empty {
            background: white;
            padding: 24px;
            border-radius: 14px;
            text-align: center;
        }

        .qr-section {
            margin-top: 24px;
            background: white;
            padding: 24px;
            border-radius: 16px;
            text-align: center;
        }

        .qr-image {
            width: 220px;
            max-width: 100%;
        }

        @media (max-width: 600px) {
            .profile-header {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<div class="container">

    <section class="profile">

        <div class="profile-header">

            <img
                th:if="${umkm.logo != null and !umkm.logo.isEmpty()}"
                th:src="${umkm.logo}"
                class="logo"
                alt="Logo UMKM">

            <div>
                <h1 th:text="${umkm.namaUsaha}">
                    Nama UMKM
                </h1>

                <p
                    th:if="${umkm.deskripsi != null}"
                    th:text="${umkm.deskripsi}">
                    Deskripsi UMKM
                </p>

                <p>
                    <strong>Alamat:</strong>
                    <span th:text="${umkm.alamat}">
                        Alamat
                    </span>
                </p>

                <p
                    th:if="${umkm.jamOperasional != null}">
                    <strong>Jam operasional:</strong>

                    <span th:text="${umkm.jamOperasional}">
                        Jam operasional
                    </span>
                </p>

                <a
                    class="whatsapp"
                    th:href="'https://wa.me/'
                        + ${#strings.replace(
                            #strings.replace(
                                #strings.replace(
                                    umkm.noWhatsapp,
                                    ' ',
                                    ''
                                ),
                                '-',
                                ''
                            ),
                            '+',
                            ''
                        )}"
                    target="_blank">
                    Hubungi melalui WhatsApp
                </a>
            </div>

        </div>

    </section>

    <h2>Produk</h2>

    <div
        class="products"
        th:if="${!products.isEmpty()}">

        <article
            class="product-card"
            th:each="product : ${products}">

            <img
                th:if="${product.foto != null
                    and !product.foto.isEmpty()}"
                th:src="${product.foto}"
                class="product-image"
                alt="Foto produk">

            <h3 th:text="${product.namaProduk}">
                Nama Produk
            </h3>

            <p
                th:if="${product.deskripsi != null}"
                th:text="${product.deskripsi}">
                Deskripsi produk
            </p>

            <p class="price">
                Rp
                <span
                    th:text="${#numbers.formatDecimal(
                        product.harga,
                        0,
                        'POINT',
                        0,
                        'COMMA'
                    )}">
                    0
                </span>
            </p>

            <p>
                Stok:
                <span th:text="${product.stok}">
                    0
                </span>
            </p>

        </article>

    </div>

    <div
        class="empty"
        th:if="${products.isEmpty()}">
        Belum ada produk yang tersedia.
    </div>

    <section class="qr-section">

        <h2>QR Code UMKM</h2>

        <p>
            Scan QR ini untuk membuka halaman UMKM.
        </p>

        <img
            class="qr-image"
            th:src="@{'/u/' + ${umkm.slug} + '/qr.png'}"
            alt="QR Code UMKM">

    </section>

</div>

</body>
</html>
